# Template for fdroiddata/metadata/io.github.vieenrose.liveradiokaraoke.yml
# Builds the entire on-device AI stack FROM SOURCE (no prebuilt blobs); declares the runtime
# Gemma download as NonFreeNet.
Categories:
  - Multimedia
License: Apache-2.0
AuthorName: vieenrose
SourceCode: https://github.com/vieenrose/live-radio-karaoke-android
IssueTracker: https://github.com/vieenrose/live-radio-karaoke-android/issues

AntiFeatures:
  NonFreeNet:
    en-US: >-
      The on-device summary/translation model (Google Gemma 3 1B) is under the non-free Gemma
      Terms of Use and is downloaded from Hugging Face at runtime after in-app consent. A
      fully-open model (LFM2.5 / Qwen2.5, Apache-2.0) can be selected instead. ASR models are
      downloaded from the k2-fsa release server.

RepoType: git
Repo: https://github.com/vieenrose/live-radio-karaoke-android.git

# The native stack is built from source (VERIFIED locally, 2026-06):
#   1. onnxruntime v1.24.3  -> libonnxruntime.so     (scripts/build-onnxruntime-android.sh)
#   2. sherpa-onnx  v1.13.3 -> libsherpa-onnx-jni.so (scripts/build-sherpa-android.sh, links #1)
#   3. llama.cpp            -> libllama-android.so   (gradle externalNativeBuild, -PwithNative)
# Steps 1-2 produce the .so files copied into app/src/main/jniLibs/arm64-v8a before the gradle
# build; step 3 is compiled by gradle. The `fdroid` product flavor selects this path.
Builds:
  - versionName: 1.0.1
    versionCode: 2
    commit: v1.0.1
    subdir: app
    gradle:
      - fdroid
    ndk: 27.2.12479018
    srclibs:
      - onnxruntime@v1.24.3
      - sherpa-onnx@v1.13.3
      - llama.cpp@master
    rm:
      - app/src/main/jniLibs
    build: |
      # Build onnxruntime + sherpa-onnx from source and stage the .so for the gradle build.
      # OFFLINE_DEPS_MIRROR makes onnxruntime build with NO network (see note below).
      export ANDROID_NDK=$$NDK$$
      export WORK="$(pwd)/../.lrk-native"
      export OFFLINE_DEPS_MIRROR="$$ortdeps$$"     # srclib holding the 15 onnxruntime dep archives
      bash $$VERSION$$/scripts/build-onnxruntime-android.sh
      bash $$VERSION$$/scripts/build-sherpa-android.sh
      mkdir -p ../src/main/jniLibs/arm64-v8a
      cp $$WORK$$/sherpa-android-arm64/*.so ../src/main/jniLibs/arm64-v8a/

# ──────────────────────────────────────────────────────────────────────────────────────────
# OFFLINE BUILD — SOLVED & VERIFIED (2026-06): onnxruntime's CMake FetchContent pulls ~15 deps
# at configure time, which F-Droid's offline builder blocks. scripts/build-onnxruntime-android.sh
# now mirrors those 15 archives and rewrites cmake/deps.txt to file:// URLs (SHA1 hashes kept).
# Confirmed to configure with ZERO network under `unshare -rn` (Configuring done, exit 0).
# The 15 deps: abseil_cpp date eigen flatbuffers googletest microsoft_gsl kleidiai mp11 json
# onnx protobuf pytorch_cpuinfo re2 safeint protoc_linux_x64.
#
# Two items to finalize for an actual fdroiddata MR (mechanical, now de-risked):
#   1. Provide those 15 archives on the offline builder — as one srclib `ortdeps` (a small repo
#      holding the archives) referenced by $$ortdeps$$ above, or split per-dep srclibs.
#   2. `protoc_linux_x64` is a PREBUILT host protoc binary (a blob). For a blob-free build, build
#      protoc from the bundled protobuf source for the host instead (onnxruntime supports a host
#      protobuf build) and pass --path_to_protoc_exe.
#
# Self-hosted repo (Route B) ships the same source-built .so today:
#   https://vieenrose.github.io/live-radio-karaoke-android/repo
# ──────────────────────────────────────────────────────────────────────────────────────────

